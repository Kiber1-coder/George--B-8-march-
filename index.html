<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>С 8 Марта, Аня!</title>
    <!-- Подключаем красивые шрифты от Google -->
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Montserrat:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="header">
        <h1>С 8 Марта, Аня! 🌷</h1>
      </div>

      <div class="photo-frame">
        <!-- 
                ВАЖНО: Чтобы вставить свою картинку, 
                1. Положи файл картинки в ту же папку, где лежат эти файлы.
                2. Назови файл, например, photo.jpg
                3. Измени src="placeholder.jpg" на src="photo.jpg"
            -->
        <img src="anya.jpg" alt="Цветы для Ани" class="main-image" />
        <div class="decoration"></div>
      </div>

      <div class="message">
        <p>
          Дорогая Аня! <br /><br />
          Поздравляю тебя с самым весенним праздником! Желаю тебе бесконечного
          счастья, море цветов, вдохновения и чтобы каждый день приносил только
          радость. Пусть глаза сияют, а улыбка не сходит с лица!
        </p>
        <p class="signature">С любовью и теплом! ❤️</p>
      </div>
    </div>
  </body>
</html>
